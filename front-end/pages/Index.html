<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Doutores de Esperança - Login</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>

<link rel="stylesheet" href="../styles/style.css">
</head>
<body>

  <div class="frame-wrapper">
    <div class="inner-card">

      <!-- Logo -->
     <div>
      <img src="../assets/logo-Doutores.png" alt="" width="120" height="120">
     </div>

    

      <!-- Formulário -->
      <div class="login-form">

        <div class="mb-3">
          <label for="cpf">CPF</label>
          <input type="text" id="cpf" class="form-control" placeholder="000.000.000-00" maxlength="14"/>
        </div>

        <div class="mb-1">
          <label for="senha">Senha</label>
          <input type="password" id="senha" class="form-control" placeholder="••••••••"/>
        </div>

        <a href="#" class="forgot-link mb-3">Esqueci minha senha</a>

        <div class="text-center mt-3">
          <button class="btn btn-entrar">Entrar</button>
        </div>

        <a href="#" class="cadastre-link">Cadastre-se</a>

      </div>
    </div><!-- /inner-card -->
  </div><!-- /frame-wrapper -->

  <!-- Bootstrap 5 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Máscara simples para CPF -->
  <script>
    document.getElementById('cpf').addEventListener('input', function(e) {
      let v = e.target.value.replace(/\D/g, '').slice(0, 11);
      if (v.length > 9) v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/, '$1.$2.$3-$4');
      else if (v.length > 6) v = v.replace(/(\d{3})(\d{3})(\d{1,3})/, '$1.$2.$3');
      else if (v.length > 3) v = v.replace(/(\d{3})(\d{1,3})/, '$1.$2');
      e.target.value = v;
    });
  </script>
</body>
</html>
